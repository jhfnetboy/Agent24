# Agent24 Evolution Config
# This file is the "DNA" of your self-evolving agent.
# The /evolve skill reads AND modifies this file to improve over time.
# Manual edits are welcome — the agent will respect them.

version: 1

# --- Identity ---
agent:
  name: agent24
  description: "Self-evolving coding and task agent"

# --- Strategy Defaults ---
# These are starting defaults. The agent updates success_rate and uses over time.
strategies:
  coding:
    approach: "read-plan-implement-verify"
    success_rate: 0.5   # updated by /evolve after each cycle
    uses: 0             # incremented each time this strategy is selected
  debugging:
    approach: "reproduce-isolate-fix-verify"
    success_rate: 0.5
    uses: 0
  refactoring:
    approach: "understand-test-refactor-verify"
    success_rate: 0.5
    uses: 0
  analysis:
    approach: "gather-explore-synthesize-report"
    success_rate: 0.5
    uses: 0
  research:
    approach: "search-read-compare-summarize"
    success_rate: 0.5
    uses: 0

# --- Evaluation Thresholds ---
# Referenced by /evolve Phase 3 (Staged Evaluation) and Phase 4 (Improve)
evaluation:
  correctness_gate: 3          # Stage 1: correctness below this skips full evaluation
  min_score_to_skip_memory: 5  # perfect score + nothing new = skip memory write
  min_score_to_keep: 3         # below this, record failure memory (what went wrong)
  staged: true                 # enable staged evaluation (Stage 1 → 2 → 3)

  # --- External Evaluator ---
  # Default: "self" (Phase 3 internal evaluation).
  # When set, external evaluator runs AFTER self-evaluation.
  # External score takes priority; self-eval is recorded as "self_score" for comparison.
  #
  # Options:
  #   evaluator: "self"                   # default, no external
  #   evaluator: "codex"                  # use Codex MCP for review
  #   evaluator: "agent-speaker"          # use remote agent via Nostr
  #   evaluator: "dual"                   # both self + external, compare scores
  #
  evaluator: "self"

  # Codex evaluator config (used when evaluator is "codex" or "dual")
  codex:
    tone: "strict"                        # strict | balanced | lenient
    focus: "correctness,security,performance"  # dimensions to emphasize

  # Agent-Speaker evaluator config (used when evaluator is "agent-speaker" or "dual")
  agent_speaker:
    evaluator_pubkey: ""                  # pubkey of the evaluating agent (required)
    relay: ""                             # relay URL (default: agent-speaker defaults)
    timeout: 60                           # seconds to wait for response

# --- Evolution Parameters ---
evolution:
  meta_review_interval: 5      # cycles before checking for cross-cycle patterns
  allow_self_modification: false  # if true, /evolve can suggest SKILL.md changes
  results_file: ".claude/results.log"  # YAML multi-doc archive, relative to cwd
  memory_scope: "auto"         # auto | global | project
