# Agent24 Evolution Config
# This file is the "DNA" of your self-evolving agent.
# The /evolve skill reads AND modifies this file to improve over time.
# Manual edits are welcome — the agent will respect them.

version: 1

# --- Identity ---
agent:
  name: agent24
  description: "Self-evolving coding and task agent"

# --- Strategy Defaults ---
# These are starting defaults. The agent updates success_rate and uses over time.
strategies:
  coding:
    approach: "read-plan-implement-verify"
    success_rate: 0.5   # updated by /evolve after each cycle
    uses: 0             # incremented each time this strategy is selected
  debugging:
    approach: "reproduce-isolate-fix-verify"
    success_rate: 0.5
    uses: 0
  refactoring:
    approach: "understand-test-refactor-verify"
    success_rate: 0.5
    uses: 0
  analysis:
    approach: "gather-explore-synthesize-report"
    success_rate: 0.5
    uses: 0
  research:
    approach: "search-read-compare-summarize"
    success_rate: 0.5
    uses: 0

# --- Evaluation Thresholds ---
# Referenced by /evolve Phase 3 (Evaluate) and Phase 4 (Improve)
evaluation:
  min_score_to_skip_memory: 5  # perfect score + nothing new = skip memory write
  min_score_to_keep: 3         # below this, strategy is marked as failed
  correctness_gate: 3          # correctness below this caps overall at 2

# --- Evolution Parameters ---
evolution:
  meta_review_interval: 5      # cycles before checking for cross-cycle patterns
  allow_self_modification: false  # if true, /evolve can suggest SKILL.md changes
  results_file: ".claude/results.log"  # relative to cwd
  memory_scope: "auto"         # auto | global | project
